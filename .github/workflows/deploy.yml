name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14"

      - name: Install dependencies
        run: opam install -y ocamlfind ocamlbuild js_of_ocaml js_of_ocaml-lwt js_of_ocaml-ppx graphics

      - name: Build
        run: opam exec -- make

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp paint.html paint.js _site/
          cp gdemo.html gdemo.js _site/
          cp lightbulb.html lightbulb.js _site/
          cp pairdemo.html pairdemo.js _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
